<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Form for Acme support project">
    <title>Contact Form</title>
</head>
<body>
    <header>
        <h1>Acme Support</h1>
        <nav>
            <ul>
                <li>Home</li>
                <li>Help</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>
    <hr>
    <main>
        <h2>Contact us</h2>
        <p>Send us a message and we will get back to you.</p>
        <br>
        <fieldset>
            <legend>Form</legend>
            <form action="https://domainurlexample.com" method="post">

                <label for="name">Name: </label>
                <input type="text" required id="name">
                <br>
                <label for="email">Email: </label>
                <input type="email" required id="email">
                <br>
                <label for="subject">Subject: </label>
                <select name="Subject" id="subject">
                    <option value="placeholder">Select a option</option>
                    <option value="topic1">Topic 1</option>
                    <option value="topic2">Topic 2</option>
                    <option value="topic3">Topic 3</option>
                </select>
                <br>
                <label for="message">Message: </label>
                <textarea name="txtarea" id="message" minlength="10" required></textarea>
                <p>How did you hear about us?</p><br>
                <input type="radio" id="opt1" name="rad">
                <label for="opt1">Search</label><br>
                <input type="radio" id="opt2" name="rad">
                <label for="opt2">Friend</label><br>
                <input type="radio" id="opt3" name="rad">
                <label for="opt3">Social Media</label><br>
                <br>
                <input type="checkbox" name="sendp" id="">
                <label for="sendp">Send me porducts updates</label>
                <br>
                <button type="submit">Send message</button>
            </form>
        </fieldset>
    </main>
    <footer>
        <p>&copy;2026 Acme Support</p>
    </footer>    
</body>
</html>
